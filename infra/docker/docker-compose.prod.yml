# Produção/homologação num único host (piloto — arquitetura §5).
# Uso (na raiz do repo):
#   cp .env.production.example .env.production   # e preencha
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.production up -d --build
#
# DNS esperado (aponte para o IP do servidor):
#   ${CHECKOUT_DOMAIN}, ${PRODUCER_DOMAIN}, ${ADMIN_DOMAIN}, ${API_DOMAIN}

name: borafest-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-borafest}
    volumes:
      - borafest_prod_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - borafest_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  # one-shot: aplica migrations e sai — api/worker só sobem depois dele
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      target: api
    command: ["sh", "-c", "cd packages/database && npx prisma migrate deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3333
      DATABASE_URL: ${DATABASE_URL:?}
      REDIS_URL: redis://redis:6379
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:?}
      PAYMENTS_PROVIDER: ${PAYMENTS_PROVIDER:-pagarme}
      PAGARME_SECRET_KEY: ${PAGARME_SECRET_KEY:-}
      PAGARME_WEBHOOK_BASIC_USER: ${PAGARME_WEBHOOK_BASIC_USER:-}
      PAGARME_WEBHOOK_BASIC_PASSWORD: ${PAGARME_WEBHOOK_BASIC_PASSWORD:-}
      MOCK_WEBHOOK_SECRET: ${MOCK_WEBHOOK_SECRET:-}
      WEB_BASE_URL: https://${CHECKOUT_DOMAIN:?}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-devlog}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-devlog}
      PLATFORM_PIX_FEE_BPS: ${PLATFORM_PIX_FEE_BPS:-499}
      PLATFORM_PIX_FEE_FLOOR_CENTS: ${PLATFORM_PIX_FEE_FLOOR_CENTS:-249}
      PLATFORM_CARD_FEE_BPS: ${PLATFORM_CARD_FEE_BPS:-699}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      target: worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?}
      REDIS_URL: redis://redis:6379
      PAYMENTS_PROVIDER: ${PAYMENTS_PROVIDER:-pagarme}
      PAGARME_SECRET_KEY: ${PAGARME_SECRET_KEY:-}
      MOCK_WEBHOOK_SECRET: ${MOCK_WEBHOOK_SECRET:-}
      WEB_BASE_URL: https://${CHECKOUT_DOMAIN:?}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-devlog}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-devlog}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  checkout:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        APP: checkout
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?}
    restart: unless-stopped

  producer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        APP: producer
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?}
    restart: unless-stopped

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        APP: admin
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?}
      CHECKOUT_DOMAIN: ${CHECKOUT_DOMAIN:?}
      PRODUCER_DOMAIN: ${PRODUCER_DOMAIN:?}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - borafest_prod_caddy_data:/data
      - borafest_prod_caddy_config:/config
    depends_on:
      - api
      - checkout
      - producer
      - admin

volumes:
  borafest_prod_postgres:
  borafest_prod_redis:
  borafest_prod_caddy_data:
  borafest_prod_caddy_config:
